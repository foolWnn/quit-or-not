  function qScore(qi) { return answers[qi] === null ? 0 : QUESTIONS[qi].options[answers[qi]].score; }

  function toPercent(raw) { return Math.max(0, Math.min(100, Math.round(((raw + 95) / 185) * 100))); }
  function getTier(pct) { for (const t of TIERS) { if (pct >= t.min) return t; } return TIERS[TIERS.length - 1]; }

  function getScene(qi) { return SCENES.find(s => qi >= s.qRange[0] && qi <= s.qRange[1]); }
  function allDone() { return answers.every(a => a !== null); }

  function sceneRawAvg(scene) {
    let sum = 0, cnt = 0;
    for (let i = scene.qRange[0]; i <= scene.qRange[1]; i++) {
      if (answers[i] !== null) { sum += qScore(i); cnt++; }
    }
    return cnt ? sum / cnt : 0;
  }

  function sceneToTen(scene) {
    const avg = sceneRawAvg(scene);
    const lim = SCENE_LIMITS[scene.id];
    const v = ((avg - lim.min) / (lim.max - lim.min)) * 9 + 1;
    return Math.max(1, Math.min(10, Math.round(v * 10) / 10));
  }

  function dimsFromAnswers() { return SCENES.map(s => ({ ...s, ten: sceneToTen(s) })); }

    if (pct >= 30) return randInt(20, 44);

  }

    optsEl.querySelectorAll('.opt').forEach(el => el.addEventListener('click', () => selectOption(+el.dataset.i, el)));
    qCard.className = 'q-card glass enter';
    renderDots();
    updateNav();
    saveProgress();
  }

  function selectOption(idx, el) {
    vibrate();
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 200);
    answers[currentQ] = idx;
    document.querySelectorAll('.opt').forEach((o, i) => o.classList.toggle('selected', i === idx));
    renderDots(); updateNav(); saveProgress();
    if (currentQ < TOTAL_Q - 1) setTimeout(() => goNext(), 380);
    else if (allDone()) setTimeout(() => showReport(), 380);
  }

  function updateNav() {
    document.getElementById('btnPrev').disabled = currentQ === 0;
    const btn = document.getElementById('btnNext');
    if (currentQ === TOTAL_Q - 1) {
      btn.innerHTML = allDone() ? '查看我的报告 <i class="fa fa-magic"></i>' : '请完成全部题目';
      btn.disabled = !allDone();
    } else {
      btn.innerHTML = '下一步 <i class="fa fa-chevron-right"></i>';
      btn.disabled = answers[currentQ] === null;
    }
  }

  function transitionTo(newQ, dir) {
    if (isAnimating) return;
    isAnimating = true;
    qCard.classList.remove('enter');
    qCard.classList.add(dir > 0 ? 'exit-left' : 'exit-right');
    setTimeout(() => { currentQ = newQ; renderQuestion(); isAnimating = false; }, 320);
  }

  function goNext() {
    if (currentQ === TOTAL_Q - 1) { if (allDone()) showReport(); return; }
    if (answers[currentQ] === null) return;
    transitionTo(currentQ + 1, 1);
  }
  function goPrev() { if (currentQ > 0) transitionTo(currentQ - 1, -1); }

  function showReport() {
    quizView.classList.add('hidden');
    document.getElementById('analyzingText').textContent = '🎉 数据采集完成，正在生成你的职场幸福报告...';
    analyzing.classList.add('show');
    setTimeout(() => {
      analyzing.classList.remove('show');
      const pct = toPercent(rawTotal());
      const tier = getTier(pct);
      const rankPct = resolveRankPct(pct, null);
      renderResult({ pct, tier, level: tier.shortLevel, tag: tier.fun, dims: dimsFromAnswers(), rankPct, fromShare: false });
      saveHistory(pct, tier);
      resultView.classList.add('show');
    }, 1500);
  }

  /** 绘制五维雷达图（DPR 适配 + 完整维度标签） */
  function drawRadar(canvas, dims) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const W = rect.width || 300;
    const H = rect.height || 300;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    const cx = W / 2, cy = H / 2;
    const chartSize = Math.min(W, H);
    const fontSize = Math.round(Math.max(11, Math.min(13, chartSize / 24)));
    const labelPad = fontSize * 2.8;
    const maxR = chartSize * 0.26;
    const labelR = maxR + labelPad;
    const n = dims.length;
    const step = (Math.PI * 2) / n, start = -Math.PI / 2;

    for (let lv = 1; lv <= 5; lv++) {
      const r = (maxR / 5) * lv;
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        const a = start + i * step, x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(255,255,255,.1)'; ctx.lineWidth = 1; ctx.stroke();
    }
    for (let i = 0; i < n; i++) {
      const a = start + i * step;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.lineTo(cx + maxR * Math.cos(a), cy + maxR * Math.sin(a));
      ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth = 1; ctx.stroke();
    }
    const pts = dims.map((d, i) => {
      const a = start + i * step, r = (d.ten / 10) * maxR;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    });
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
    grad.addColorStop(0, 'rgba(52,211,153,0.5)'); grad.addColorStop(1, 'rgba(129,140,248,0.2)');
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'rgba(110,231,183,0.85)'; ctx.lineWidth = 2; ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,.92)';
    ctx.font = `${fontSize}px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif`;

    dims.forEach((d, i) => {
      const a = start + i * step;
      const cos = Math.cos(a), sin = Math.sin(a);
      let lx = cx + labelR * cos;
      let ly = cy + labelR * sin;
      let align = 'center', baseline = 'middle';

      if (sin < -0.55) { baseline = 'bottom'; ly -= 2; }
      else if (sin > 0.55) { baseline = 'top'; ly += 2; }
      else if (cos > 0.15) { align = 'left'; lx += 5; }
      else if (cos < -0.15) { align = 'right'; lx -= 5; }

      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      const tw = ctx.measureText(d.name).width;
      const margin = 3;

      if (align === 'center') {
        lx = Math.max(margin + tw / 2, Math.min(W - margin - tw / 2, lx));
      } else if (align === 'left') {
        lx = Math.max(margin, Math.min(W - margin - tw, lx));
      } else {
        lx = Math.max(margin + tw, Math.min(W - margin, lx));
      }
      ly = Math.max(fontSize * 0.6, Math.min(H - fontSize * 0.4, ly));
      ctx.fillText(d.name, lx, ly);
    });
  }

  function renderResult(data) {
    const { pct, tier, tag, dims, fromShare } = data;
    const rankPct = resolveRankPct(pct, data.rankPct);
    const heartText = data.heartText || getHeartText(pct);
    const letter = data.letter || buildHRLetter(pct, { ...tier, fun: tag });
    lastResult = { pct, tier, level: data.level, tag, dims, rankPct, heartText, letter, fromShare: !!fromShare };

    document.getElementById('sharedBanner').classList.toggle('show', !!fromShare);
    document.getElementById('btnRetest').style.display = fromShare ? 'none' : 'block';
    document.getElementById('btnTryMine').style.display = fromShare ? 'block' : 'none';
    document.getElementById('btnCopyAll').style.display = fromShare ? 'none' : 'block';

    const ring = document.getElementById('resultRing');
    ring.style.strokeDashoffset = RING_C * (1 - pct / 100);
    ring.style.stroke = tier.color;
    document.getElementById('resultScore').textContent = pct;
    document.getElementById('verdictMain').textContent = tier.title;
    const funEl = document.getElementById('verdictFun');
    funEl.textContent = tag;
    funEl.style.color = tier.color;
    funEl.style.border = `1px solid ${tier.color}44`;

    document.getElementById('workplaceTags').textContent = getWorkplaceTags(dims);
    document.getElementById('benchmark').textContent = `🏆 你的幸福度超过了 ${rankPct}% 的打工人`;
    document.getElementById('heartText').textContent = heartText;

    requestAnimationFrame(() => requestAnimationFrame(() => drawRadar(document.getElementById('radarCanvas'), dims)));

    document.getElementById('dimBars').innerHTML = dims.map((d, i) => `
      <div class="dim-row">
        <div class="dim-head"><span>${d.icon} ${d.name}</span><span>${d.ten} / 10</span></div>
        <div class="bar-track"><div class="bar-fill" data-w="${d.ten * 10}" style="background:${BAR_COLORS[i]}"></div></div>
      </div>`).join('');
    requestAnimationFrame(() => document.querySelectorAll('#dimBars .bar-fill').forEach(b => { b.style.width = b.dataset.w + '%'; }));

    const ranked = [...dims].sort((a, b) => b.ten - a.ten);
    const high = ranked[0], second = ranked[1], low = ranked[ranked.length - 1];
    document.getElementById('insights').innerHTML = [
      `你的【${high.name}】表现最好（${high.ten}/10），${getHighInsight(high.id)}`,
      low.ten <= 4
        ? `【${low.name}】得分最低（${low.ten}/10），${getLowInsight(low.id)}`
        : `【${second.name}】也有提升空间（${second.ten}/10），值得持续优化。`,
      getConflictInsight(ranked, pct)
    ].map(t => `<li>${t}</li>`).join('');

    document.getElementById('letterHeading').textContent = `🎭 给 HR 的「${letter.title}」`;
    document.getElementById('resignLetter').textContent = letter.body;
    if (!fromShare) saveResultState(lastResult);
    if (!fromShare) updateFooter();
    else document.getElementById('resultFooter').innerHTML = '📎 这是好友分享的结果，不会记录到你的历史';
  }

  function getHighInsight(id) {
    const m = {
      money: '经济回报是你最大的职场底气。',
      time: '时间自由让你能好好生活。',
      growth: '成长空间充足，未来可期。',
      social: '人际环境融洽，上班有温度。',
      mental: '内心充盈，是真正的好工作。'
    };
    return m[id] || '是你职场幸福感的核心支柱。';
  }

  function getLowInsight(id) {
    const m = {
      money: '薪资回报偏低，是拉低幸福度的主因。',
      time: '通勤和加班正在严重消耗你的精力。',
      growth: '成长停滞，让你对未来缺乏期待。',
      social: '人际内耗正在侵蚀你的日常。',
      mental: '心理压力过大，幸福感受损明显。'
    };
    return m[id] || '建议优先从这个维度寻找改善空间。';
  }

  function getConflictInsight(ranked, pct) {
    const money = ranked.find(s => s.id === 'money');
    const time = ranked.find(s => s.id === 'time');
    const mental = ranked.find(s => s.id === 'mental');
    const low = ranked[ranked.length - 1];
    if (money.ten >= 7 && time.ten <= 4) return '你最大的矛盾点是：钱给够了，但太累了。建议和领导谈一次弹性办公。';
    if (mental.ten <= 3 && money.ten >= 6) return '钱给够了，但心已经走了。建议认真评估精神成本。';
    if (pct >= 60) return '整体幸福度不错，珍惜当下，同时保持对短板的关注。';
    if (low.ten <= 4) return `建议优先改善【${low.name}】，这可能是提升幸福感的突破口。`;
    return '多个维度都在拖后腿，建议系统梳理不满清单后再做决策。';
  }

  function updateFooter() {
    const txt = formatHistory(getHistory());
    document.getElementById('footerNote').innerHTML = txt;
    document.getElementById('resultFooter').innerHTML = txt;
  }

  function formatHistory(hist) {
    if (!hist.length) return '📅 暂无历史测试记录';
    const last = hist[hist.length - 1];
    const ds = `${new Date(last.date).getMonth() + 1}月${new Date(last.date).getDate()}日`;
    let trend = '';
    if (hist.length >= 2) {
      const dlt = last.score - hist[hist.length - 2].score;
      if (dlt > 0) trend = ` · <span class="trend-up">↑ +${dlt} 幸福上升</span>`;
      else if (dlt < 0) trend = ` · <span class="trend-down">↓ ${Math.abs(dlt)} 幸福下降</span>`;
    }
    return `📅 上次测试：${ds}，幸福度 ${last.score} 分（${last.level}）${trend}`;
  }

  function buildShareUrl(pct, tier, dims, rankPct) {
    const params = new URLSearchParams();
    params.set('score', String(Math.round(pct)));
    params.set('level', tier.shortLevel);
    params.set('tag', tier.fun);
    params.set('rank', String(rankPct));
    DIM_KEYS.forEach(dk => {
      const dim = dims.find(d => d.id === dk.sceneId);
      if (dim) params.set(dk.key, String(Math.round(dim.ten)));
    });
    return location.href.split('?')[0] + '?' + params.toString();
  }

  function parseShareParams() {
    const p = new URLSearchParams(location.search);
    if (!p.has('score')) return null;
    const required = ['score', 'level', 'tag', 'salary', 'intensity', 'growth', 'social', 'feeling'];
    for (const k of required) { if (!p.get(k)) return null; }
    const score = parseInt(p.get('score'), 10);
    const rankRaw = p.get('rank');
    const rankPct = rankRaw ? parseInt(rankRaw, 10) : generateRankPct(score);
    const vals = [parseFloat(p.get('salary')), parseFloat(p.get('intensity')), parseFloat(p.get('growth')), parseFloat(p.get('social')), parseFloat(p.get('feeling'))];
    if (isNaN(score) || score < 0 || score > 100) return null;
    if (isNaN(rankPct) || rankPct < 1 || rankPct > 99) return null;
    if (vals.some(v => isNaN(v) || v < 1 || v > 10)) return null;
    const tier = getTierByLevel(p.get('level'), score);
    const tag = p.get('tag');
    return {
      pct: score, level: p.get('level'), tag,
      rankPct,
      dims: buildDimScores(vals[0], vals[1], vals[2], vals[3], vals[4]),
      letter: buildHRLetter(score, { ...tier, fun: tag }),
      heartText: getHeartText(score)
    };
  }

  function openSharedResult() {
    const shared = parseShareParams();
    if (!shared) return false;
    isSharedView = true;
    quizView.classList.add('hidden');
    analyzing.classList.remove('show');
    renderResult({
      pct: shared.pct, tier: getTierByLevel(shared.level, shared.pct), level: shared.level,
      tag: shared.tag, dims: shared.dims, rankPct: shared.rankPct,
      letter: shared.letter, heartText: shared.heartText, fromShare: true
    });
    resultView.classList.add('show');
    return true;
  }

  function clearUrlAndStartQuiz() {
    isSharedView = false;
    history.replaceState(null, '', location.pathname + location.hash);
    answers = new Array(TOTAL_Q).fill(null);
    currentQ = 0; lastResult = null;
    localStorage.removeItem(RESULT_KEY);
    saveProgress();
    resultView.classList.remove('show');
    quizView.classList.remove('hidden');
    document.getElementById('sharedBanner').classList.remove('show');
    bindQuizEvents();
    renderQuestion();
    updateFooter();
  }

  function copyText(text, msg) {
    navigator.clipboard.writeText(text).then(() => toast(msg)).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      toast(msg);
    });
  }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function buildShareData(result) {
    const url = buildShareUrl(result.pct, result.tier, result.dims, result.rankPct);
    return {
      title: `我测了一下职场幸福度，${result.pct}分！`,
      text: `${result.pct}分 · ${result.tier.title} · ${result.tag}`,
      url
    };
  }

  function shareResult() {
    if (!lastResult) return;
    const shareData = buildShareData(lastResult);
    if (navigator.share) {
      navigator.share(shareData).catch(function (err) {
        if (err && err.name === 'AbortError') return;
        copyText(shareData.url, '已复制链接，快去分享给朋友吧！');
      });
      return;
    }
    copyText(shareData.url, '已复制链接，快去分享给朋友吧！');
  }

  function openFeedback() {
    document.getElementById('feedbackModal').classList.add('show');
  }
  function closeFeedback() {
    document.getElementById('feedbackModal').classList.remove('show');
  }

  function bindQuizEvents() {
    document.getElementById('btnNext').onclick = goNext;
    document.getElementById('btnPrev').onclick = goPrev;
    document.getElementById('btnCopyAll').onclick = shareResult;
    document.getElementById('btnRetest').onclick = retest;
    document.getElementById('btnTryMine').onclick = clearUrlAndStartQuiz;
    document.getElementById('btnReset').onclick = resetAll;
    document.getElementById('btnReset2').onclick = resetAll;
  }

  function resetAll() {
    if (!confirm('确定清空所有数据吗？')) return;
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(HISTORY_KEY);
    localStorage.removeItem(RESULT_KEY);
    location.reload();
  }

  function retest() {
    if (isSharedView) { clearUrlAndStartQuiz(); return; }
    answers = new Array(TOTAL_Q).fill(null);
    currentQ = 0; lastResult = null;
    localStorage.removeItem(RESULT_KEY);
    saveProgress();
    resultView.classList.remove('show');
    quizView.classList.remove('hidden');
    renderQuestion();
    updateFooter();
  }

  function restoreSavedResult() {
    const saved = loadResultState();
    if (!saved || !allDone()) return false;
    const pct = toPercent(rawTotal());
    if (saved.pct !== pct || saved.answersHash !== answersHash()) return false;
    const tier = getTier(pct);
    quizView.classList.add('hidden');
    analyzing.classList.remove('show');
    renderResult({
      pct, tier, level: saved.level || tier.shortLevel, tag: saved.tag || tier.fun,
      dims: dimsFromAnswers(), rankPct: saved.rankPct,
      heartText: saved.heartText, letter: { title: saved.letterTitle, body: saved.letterBody },
      fromShare: false
    });
    resultView.classList.add('show');
    return true;
  }

  function bindGlobalEvents() {
    document.getElementById('btnFeedback').onclick = openFeedback;
    document.getElementById('btnFeedbackClose').onclick = closeFeedback;
    document.getElementById('feedbackBackdrop').onclick = closeFeedback;
  }

  function init() {
    bindGlobalEvents();
    if (openSharedResult()) {
      document.getElementById('btnTryMine').onclick = clearUrlAndStartQuiz;
      document.getElementById('btnReset2').onclick = resetAll;
      return;
    }
    loadProgress();
    if (restoreSavedResult()) {
      bindQuizEvents();
      return;
    }
    renderQuestion();
    updateFooter();
    bindQuizEvents();
  }

  init();
})();
</script>
</body>
</html>
